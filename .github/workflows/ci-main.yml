name: CI Main

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci-main.yml'

concurrency:
  group: ci-main
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The impresspress crate's build.rs `include_bytes!`s the impresspress-web wasm, so
  # every job that compiles the workspace previously ran `wasm-pack build
  # --release` itself. Build it once here and share `pkg/` as an artifact.
  build-wasm:
    name: Build impresspress-web wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Pin explicitly. With no version the action resolves "latest" via
          # the GitHub API and falls back to its ancient hardcoded default
          # (v0.9.1) whenever that lookup flakes/rate-limits — and v0.9.1
          # cannot parse workspace-inherited manifest fields like
          # `license.workspace = true`, failing with "invalid type: map,
          # expected a string for key `package.license`". Matches gizza-ai's
          # pin (PR #75).
          version: 'v0.15.0'

      - name: Build WASM
        run: cd crates/impresspress-web && wasm-pack build --target web --release --out-dir pkg

      - name: Upload pkg/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg/
          retention-days: 1

  check:
    name: Format & Lint
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: check

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      # clippy compiles impresspress, whose build.rs `include_bytes!`s the
      # impresspress-web wasm. Download the prebuilt pkg/ so build.rs finds it.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      - name: Run clippy
        run: cargo clippy --workspace --exclude impresspress-web --exclude impresspress-cloudflare

  test:
    name: Tests
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      # The impresspress crate's build.rs `include_bytes!`s the impresspress-web wasm;
      # without it `cargo test --workspace` fails before any test runs.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      - name: Run tests
        run: cargo test --workspace --exclude impresspress-web --exclude impresspress-cloudflare

  wasm:
    name: Cloudflare wasm32 check
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cloudflare

      # build.rs prereq for any impresspress crate pulled into the cloudflare build.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      # impresspress-cloudflare is wasm-only (cdylib targeting CF Workers).
      - name: Check impresspress-cloudflare (wasm32)
        run: cargo check -p impresspress-cloudflare --target wasm32-unknown-unknown

      # Browser-target crates are also wasm-only consumers of wafer-run, and
      # nothing else in CI builds them for wasm32 — a set_asset_loader
      # signature break sat silently red on main for 5 days before the
      # impresspress #253 review caught it.
      - name: Check impresspress-browser + minimal-browser (wasm32)
        run: cargo check -p impresspress-browser -p minimal-browser --target wasm32-unknown-unknown

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ignore entries in .cargo/audit.toml carry `expiry=YYYY-MM-DD`
      # markers so temporary exceptions get re-triaged instead of living
      # there forever. Fails the job if any marker's date has passed.
      - name: Check for expired cargo-audit exceptions
        run: bash scripts/check-audit-expiry.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      # Blocking: a new, un-reviewed advisory fails CI. Known-acceptable
      # exceptions (with owner + expiry) live in .cargo/audit.toml — see
      # that file for the review/renewal process.
      - name: Run audit
        run: cargo audit

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout wafer-run (for local dependency)
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: "Build wafer-client-js (file: dep needs dist for tsc)"
        working-directory: ../wafer-run/packages/wafer-client-js
        run: |
          npm ci
          npm run build

      - name: Install and build SDK
        working-directory: packages/impresspress-js
        run: |
          npm ci
          npm run build
          npm run lint

      - name: Test SDK
        working-directory: packages/impresspress-js
        run: npm test

      - name: Smoke-test clean pack/install
        working-directory: packages/impresspress-js
        run: npm run test:pack-install

  cross-compile:
    name: Cross-Compile (${{ matrix.name }})
    needs: build-wasm
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            name: windows-amd64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cross-${{ matrix.name }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install cross-compilation tools (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64

      # impresspress's build.rs `include_bytes!`s the impresspress-web wasm; the wasm is
      # platform-independent, so download the shared artifact rather than
      # rebuilding it on every target (including the macOS runners).
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      - name: Build
        run: cargo build -p impresspress --release --target ${{ matrix.target }}

  coverage:
    name: Coverage
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: coverage

      # impresspress's build.rs `include_bytes!`s the impresspress-web wasm;
      # llvm-cov compiles the workspace, so the prebuilt pkg/ must be present.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      - name: Generate coverage
        run: cargo llvm-cov --workspace --exclude impresspress-web --exclude impresspress-cloudflare --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
