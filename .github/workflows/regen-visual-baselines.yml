name: Regen Visual Baselines

# Manually-triggered workflow that re-runs the visual-baseline Playwright
# suite with `--update-snapshots` against a target branch, then commits and
# pushes any baseline diffs back to that branch.
#
# Why this exists: CI's font/AA rendering on ubuntu-latest drifts deterministically
# from local Linux renders for content-heavy mobile cards-table baselines
# (see Phase 5d-C/E handoff). The CI render is the canonical baseline, so when
# a PR touches UI that lands on a flaky-mobile route, regen from CI here.
#
# Usage:
#   gh workflow run regen-visual-baselines.yml -f branch=<branch-name>
#
# Or from the Actions UI: select the workflow and provide a branch input.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to regen baselines on (the workflow checks it out, runs --update-snapshots, and pushes any PNG diffs back)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  regen:
    name: Regen visual baselines on ${{ inputs.branch }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          # Need a token that can push commits back to the branch.
          # GITHUB_TOKEN with `contents: write` (above) is sufficient
          # for non-protected branches.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: e2e

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Pin explicitly — unpinned "latest" falls back to v0.9.1 on a GitHub
          # API flake, which can't parse `license.workspace = true`. Matches ci.yml.
          version: 'v0.15.0'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pre-build impresspress-web wasm (build.rs prereq)
        working-directory: crates/impresspress-web
        run: wasm-pack build --target web --release --out-dir pkg

      - name: Install impresspress CLI
        run: cargo install --path crates/impresspress --locked

      - name: Build impresspress-web (framework assets + hashed pkg/)
        working-directory: crates/impresspress-web
        run: impresspress build --target web --release

      - name: Install Playwright
        working-directory: crates/impresspress-web
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Start native impresspress server in background
        run: |
          cd /tmp
          IMPRESSPRESS_LISTEN="127.0.0.1:8093" \
          IMPRESSPRESS_DB_PATH="/tmp/impresspress-visual-baseline.db" \
          WAFER_RUN_SHARED__AUTH__BOOTSTRAP_ADMIN_EMAIL="admin@example.com" \
          WAFER_RUN_SHARED__AUTH__BOOTSTRAP_ADMIN_PASSWORD="admin123" \
          IMPRESSPRESS_BLOCK_ENABLED="impresspress/userportal,impresspress/vector" \
            impresspress > /tmp/impresspress-baseline.log 2>&1 &
          echo $! > /tmp/impresspress-pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8093/b/auth/login -o /dev/null; then
              echo "server ready after ${i}s"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:8093/b/auth/login -o /dev/null; then
            echo "::error::native impresspress did not start within 60s"
            tail -50 /tmp/impresspress-baseline.log
            exit 1
          fi

      - name: Run visual-baseline tests with --update-snapshots
        working-directory: crates/impresspress-web
        env:
          TEST_PORT: 8093
        # `--update-snapshots` overwrites mismatched PNGs in place.
        # Test step succeeds even if snapshots changed; we detect via git diff below.
        run: npx playwright test --config=tests/playwright.visual-baseline.config.ts tests/e2e/visual-baseline.spec.ts --update-snapshots

      - name: Stop servers
        if: always()
        run: |
          if [ -f /tmp/impresspress-pid ]; then
            kill "$(cat /tmp/impresspress-pid)" 2>/dev/null || true
          fi

      # The products browser-lifecycle specs snapshot into the same
      # .playwright-mcp/ tree but run fully mocked — no native server needed.
      - name: Regen products browser-lifecycle snapshots
        working-directory: crates/impresspress-web
        run: npx playwright test --config=tests/playwright.config.ts tests/e2e/products-*.spec.ts --update-snapshots

      - name: Install examples-suite dependencies
        working-directory: examples
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Regen products static-example snapshots
        working-directory: examples
        run: npm run test:products:update

      - name: Commit and push regenerated baselines
        # `${{ inputs.branch }}` is routed through env vars (not interpolated
        # into the script body) to avoid GitHub Actions script-injection.
        env:
          TARGET_BRANCH: ${{ inputs.branch }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Use `git status --porcelain` instead of `git diff` so this also
          # picks up untracked baselines — i.e. ones that were deleted in
          # the PR's prior commit and recreated by --update-snapshots.
          if [ -z "$(git status --porcelain '.playwright-mcp/' 'examples/tests/')" ]; then
            echo "::notice::No baseline drift — nothing to commit."
            exit 0
          fi
          echo "Baseline diff detected:"
          git status --porcelain '.playwright-mcp/' 'examples/tests/'
          git add .playwright-mcp/ examples/tests/
          git commit -m "test(ui): regen visual baselines from CI render (auto-committed by regen-visual-baselines.yml against ${TARGET_BRANCH})"
          git push origin "HEAD:${TARGET_BRANCH}"
