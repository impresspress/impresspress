name: Deploy Browser Demo

on:
  push:
    branches: [main]
    paths:
      - 'crates/impresspress-web/**'
      - 'crates/impresspress-core/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin explicitly — unpinned "latest" falls back to v0.9.1 on a GitHub
          # API flake, and v0.9.1 can't parse `license.workspace = true`.
          # This is live push-to-main infra; matches ci.yml's pin.
          version: 'v0.15.0'

      # `cargo install --path crates/impresspress` runs the impresspress build.rs,
      # which `include_bytes!`s the impresspress-web wasm. Build it first so
      # build.rs finds it in the canonical pkg/ location.
      - name: Pre-build impresspress-web wasm (build.rs prereq)
        working-directory: crates/impresspress-web
        run: wasm-pack build --target web --release --out-dir pkg

      - name: Install impresspress CLI
        run: cargo install --path crates/impresspress --locked

      # Embed × web flow (Cargo.toml + impresspress.toml present): the unified
      # CLI re-runs wasm-pack, then `impresspress_bundle::bundle::run`
      # to drop sw.js / loader.js / index.html / hashed assets into pkg/.
      - name: Build impresspress-web (framework assets + hashed pkg/)
        working-directory: crates/impresspress-web
        run: impresspress build --target web --release

      - name: Add CNAME
        run: echo "demo.impresspress.org" > crates/impresspress-web/pkg/CNAME

      - name: Remove wasm-pack .gitignore (blocks gh-pages deploy)
        run: rm -f crates/impresspress-web/pkg/.gitignore

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEMO_PAT }}
          external_repository: impresspress/impresspress-demo
          publish_branch: gh-pages
          publish_dir: crates/impresspress-web/pkg
          force_orphan: true
