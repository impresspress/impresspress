name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'packages/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      # Visual-baseline PNGs live outside crates/. Without this, baseline-only
      # commits (e.g. from regen-visual-baselines.yml) skip CI and the PR
      # shows "no checks" — blocking merge.
      - '.playwright-mcp/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # The impresspress crate's build.rs `include_bytes!`s the impresspress-web wasm, so
  # every job that compiles the workspace (check/test/e2e-build) previously ran
  # `wasm-pack build --release` itself — six redundant wasm-opt passes per run.
  # Build it once here, publish `pkg/` as an artifact, and have downstream jobs
  # download it instead of rebuilding.
  build-wasm:
    name: Build impresspress-web wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Pin explicitly. With no version the action resolves "latest" via
          # the GitHub API and falls back to its ancient hardcoded default
          # (v0.9.1) whenever that lookup flakes/rate-limits — and v0.9.1
          # cannot parse workspace-inherited manifest fields like
          # `license.workspace = true`, failing with "invalid type: map,
          # expected a string for key `package.license`". Matches gizza-ai's
          # pin (PR #75).
          version: 'v0.15.0'

      - name: Build WASM
        run: cd crates/impresspress-web && wasm-pack build --target web --release --out-dir pkg

      - name: Upload pkg/ artifact
        uses: actions/upload-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg/
          retention-days: 1

  check:
    name: Format & Lint
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint — no full-page html! outside ui/
        run: bash scripts/grep-guard-html.sh

      - name: Lint — WRAP-grant coverage on cross-block db::* callsites
        run: bash scripts/audit-wrap-grants.sh

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install nightly rustfmt
        run: rustup toolchain install nightly --component rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: check

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      # clippy compiles impresspress, whose build.rs `include_bytes!`s the
      # impresspress-web wasm. Download the prebuilt pkg/ so build.rs finds it.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      - name: Run clippy
        run: cargo clippy --workspace --exclude impresspress-web --exclude impresspress-cloudflare

  test:
    name: Tests
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      # The impresspress crate's build.rs `include_bytes!`s the impresspress-web wasm;
      # without it `cargo test --workspace` fails before any test runs.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      # Auth tests (tests/auth, tests/auth_http) run against in-memory
      # SQLite only. A dual-backend matrix (sqlite + postgres) for the
      # `wafer_run__auth__*` tables is deferred until a postgres-backed
      # test context lands in wafer-block-postgres — Plan A did not wire
      # one, and Plans B + C reuse the same MigrationTestCtx shape so
      # the deferral still stands. In particular the partial unique
      # index `orgs(verified_via, verified_ref) WHERE NOT is_reserved`
      # introduced by migration 002 needs a postgres variant before it
      # can be exercised in a real dual-backend CI matrix — extending
      # the harness is the right root-cause fix rather than bolting a
      # separate job on here.
      - name: Run tests
        run: cargo test --workspace --exclude impresspress-web --exclude impresspress-cloudflare

  cloudflare:
    name: Cloudflare wasm32 check
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cloudflare

      # build.rs prereq for any impresspress crate pulled into the cloudflare build.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      # impresspress-cloudflare is wasm-only (cdylib targeting CF Workers).
      # Excluded from host `cargo test`/`clippy` because its R2/D1 services
      # wrap `!Send` JsFutures that violate wafer-core's Send-bound traits
      # on host. Verify the crate compiles for wasm32 here.
      - name: Check impresspress-cloudflare (wasm32)
        run: cargo check -p impresspress-cloudflare --target wasm32-unknown-unknown

      # Browser-target crates are also wasm-only consumers of wafer-run, and
      # nothing else in CI builds them for wasm32 — a set_asset_loader
      # signature break sat silently red on main for 5 days before the
      # impresspress #253 review caught it.
      - name: Check impresspress-browser + minimal-browser (wasm32)
        run: cargo check -p impresspress-browser -p minimal-browser --target wasm32-unknown-unknown

  # impresspress-browser's `#[wasm_bindgen_test]`s (storage.rs, bridge.rs,
  # network.rs — the wasm32-only-gated modules) previously only got
  # `cargo check --target wasm32-unknown-unknown`'d by the `cloudflare` job
  # above — compiled, never executed. They're pure JsValue-shape unit tests
  # (build/decode plain JS objects via js-sys — no OPFS, no real fetch, no
  # DOM) so they run headlessly under Node via `wasm-pack test --node`; no
  # browser install needed. Independent of the impresspress-web wasm build
  # (build.rs's include_bytes! prereq only matters for the `impresspress`
  # crate), so this job doesn't need `build-wasm`'s artifact.
  browser-wasm-test:
    name: Browser WASM tests (impresspress-browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gate like the `sdk` job below: skip the (slower, wasm-target) build
      # entirely on PRs that don't touch impresspress-browser.
      - name: Check for impresspress-browser changes
        id: browser-changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- crates/impresspress-browser/)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.browser-changes.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        if: steps.browser-changes.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: browser-wasm-test

      - name: Install wasm-pack
        if: steps.browser-changes.outputs.skip != 'true'
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          version: 'v0.15.0'

      - name: Run impresspress-browser wasm tests (Node)
        if: steps.browser-changes.outputs.skip != 'true'
        run: wasm-pack test --node crates/impresspress-browser

  # E2E is split into a single build stage plus two independent test stages so
  # the browser-WASM smoke tests (port 8080) and the native-server visual
  # baselines (port 8093) run in parallel instead of end-to-end in one job.
  e2e-build:
    name: E2E build (CLI + web assets)
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout wafer-run
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: e2e

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa  # v0.4.0
        with:
          # Pin explicitly. With no version the action resolves "latest" via
          # the GitHub API and falls back to its ancient hardcoded default
          # (v0.9.1) whenever that lookup flakes/rate-limits — and v0.9.1
          # cannot parse workspace-inherited manifest fields like
          # `license.workspace = true`, failing with "invalid type: map,
          # expected a string for key `package.license`". Matches gizza-ai's
          # pin (PR #75).
          version: 'v0.15.0'

      # build.rs prereq: the impresspress build.rs `include_bytes!`s this wasm.
      # Download the shared artifact instead of rebuilding it here.
      - name: Download impresspress-web pkg/
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-pkg
          path: crates/impresspress-web/pkg

      # Debug build (not `--release`): the visual-baseline server serves
      # server-rendered HTML and the smoke flow is browser-WASM, so the native
      # binary's runtime speed is irrelevant — a debug compile is far cheaper.
      # `--root out` lands the binary at out/bin/impresspress for artifact upload.
      - name: Install impresspress CLI (debug)
        run: cargo install --path crates/impresspress --locked --debug --root "$GITHUB_WORKSPACE/out"

      - name: Put impresspress on PATH
        run: echo "$GITHUB_WORKSPACE/out/bin" >> "$GITHUB_PATH"

      # Embed × web flow (Cargo.toml + impresspress.toml present): the unified
      # CLI runs wasm-pack, then `impresspress_bundle::bundle::run` to drop
      # sw.js / loader.js / index.html / hashed assets into pkg/. This produces
      # the served bundle for the smoke tests, overwriting the prereq pkg/.
      - name: Build impresspress-web (framework assets + hashed pkg/)
        working-directory: crates/impresspress-web
        run: impresspress build --target web --release

      - name: Upload bundled web dist
        uses: actions/upload-artifact@v4
        with:
          name: impresspress-web-dist
          path: crates/impresspress-web/pkg/
          retention-days: 1

      - name: Upload impresspress binary
        uses: actions/upload-artifact@v4
        with:
          name: impresspress-bin
          path: out/bin/impresspress
          retention-days: 1

  e2e-smoke:
    name: E2E smoke (browser WASM)
    needs: e2e-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download bundled web dist
        uses: actions/download-artifact@v4
        with:
          name: impresspress-web-dist
          path: crates/impresspress-web/pkg

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('crates/impresspress-web/package-lock.json') }}

      - name: Install Playwright
        working-directory: crates/impresspress-web
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Serve pkg/ in background (smoke tests)
        working-directory: crates/impresspress-web
        run: |
          python3 -m http.server 8080 -d pkg &
          echo $! > /tmp/http-pid
          # Wait for server to accept connections
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8080/sw.js > /dev/null; then
              break
            fi
            sleep 1
          done

      - name: Run smoke tests (browser WASM, port 8080)
        working-directory: crates/impresspress-web
        run: npx playwright test --config=tests/playwright.config.ts tests/e2e/smoke.spec.ts

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/http-pid ]; then
            kill "$(cat /tmp/http-pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: crates/impresspress-web/playwright-report/
          retention-days: 7

  e2e-visual:
    name: E2E visual baselines (native server)
    needs: e2e-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download impresspress binary
        uses: actions/download-artifact@v4
        with:
          name: impresspress-bin
          path: out/bin

      - name: Put impresspress on PATH
        run: |
          chmod +x "$GITHUB_WORKSPACE/out/bin/impresspress"
          echo "$GITHUB_WORKSPACE/out/bin" >> "$GITHUB_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('crates/impresspress-web/package-lock.json') }}

      - name: Install Playwright
        working-directory: crates/impresspress-web
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start native impresspress server in background (visual-baseline tests)
        run: |
          # Run from /tmp so impresspress auto-detects "sealed" mode (no
          # ancestor Cargo.toml). Running from inside the repo triggers
          # embed_native flow which `cargo build`s the whole workspace
          # before the server starts, busting the wait loop.
          cd /tmp
          IMPRESSPRESS_LISTEN="127.0.0.1:8093" \
          IMPRESSPRESS_DB_PATH="/tmp/impresspress-visual-baseline.db" \
          WAFER_RUN_SHARED__AUTH__BOOTSTRAP_ADMIN_EMAIL="admin@example.com" \
          WAFER_RUN_SHARED__AUTH__BOOTSTRAP_ADMIN_PASSWORD="admin123" \
          IMPRESSPRESS_BLOCK_ENABLED="impresspress/userportal,impresspress/vector" \
            impresspress > /tmp/impresspress-baseline.log 2>&1 &
          echo $! > /tmp/impresspress-pid
          # Wait for native server to accept connections (60s; sealed-mode
          # boot is fast — SQLite seed + WAFER init only).
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8093/b/auth/login -o /dev/null; then
              echo "server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Fail fast if server never came up (don't hand a dead port to playwright).
          if ! curl -sf http://127.0.0.1:8093/b/auth/login -o /dev/null; then
            echo "::error::native impresspress did not start within 60s"
            tail -50 /tmp/impresspress-baseline.log
            exit 1
          fi

      - name: Run visual-baseline tests (native server, port 8093)
        working-directory: crates/impresspress-web
        env:
          TEST_PORT: 8093
        run: npx playwright test --config=tests/playwright.visual-baseline.config.ts tests/e2e/visual-baseline.spec.ts

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/impresspress-pid ]; then
            kill "$(cat /tmp/impresspress-pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: crates/impresspress-web/playwright-report/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ignore entries in .cargo/audit.toml carry `expiry=YYYY-MM-DD`
      # markers so temporary exceptions get re-triaged instead of living
      # there forever. Fails the job if any marker's date has passed.
      - name: Check for expired cargo-audit exceptions
        run: bash scripts/check-audit-expiry.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet

      # Blocking: a new, un-reviewed advisory fails CI. Known-acceptable
      # exceptions (with owner + expiry) live in .cargo/audit.toml — see
      # that file for the review/renewal process.
      - name: Run audit
        run: cargo audit

  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for SDK changes
        id: sdk-changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD -- packages/impresspress-js/)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.sdk-changes.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout wafer-run (for local dependency)
        if: steps.sdk-changes.outputs.skip != 'true'
        run: git clone --depth 1 https://github.com/wafer-run/wafer-run.git "$GITHUB_WORKSPACE/../wafer-run"

      - name: "Build wafer-client-js (file: dep needs dist for tsc)"
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: ../wafer-run/packages/wafer-client-js
        run: |
          npm ci
          npm run build

      - name: Install and build SDK
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: packages/impresspress-js
        run: |
          npm ci
          npm run build
          npm run lint

      - name: Test SDK
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: packages/impresspress-js
        run: npm test

      - name: Smoke-test clean pack/install
        if: steps.sdk-changes.outputs.skip != 'true'
        working-directory: packages/impresspress-js
        run: npm run test:pack-install
