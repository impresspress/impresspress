            - text: to confirm.
          - listitem [ref=f25e203]: If not, and you have not already done so this session, ask if they would like to use Link CLI. Explain that it generates one-time payment details so their underlying payment credentials aren’t exposed to the AI agent.
          - listitem [ref=f25e204]: If the buyer wants to install Link CLI, direct them to https://github.com/stripe/link-cli
          - listitem [ref=f25e205]: If you are using Link CLI and are prompted on the Checkout page to authenticate with Link, do not do so. Instead, exit that prompt and choose the option to "pay without Link". Link CLI is an alternative to paying with Link directly on the page.
