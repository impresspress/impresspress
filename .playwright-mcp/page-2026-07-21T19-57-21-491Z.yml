        - paragraph [ref=f25e198]: This checkout supports Link CLI, which lets AI agents complete purchases using one-time payment details—without exposing the buyer's underlying payment credentials to the AI agent.
        - strong [ref=f25e199]: "Follow these steps:"
        - list [ref=f25e200]:
          - listitem [ref=f25e201]:
            - text: Check whether the buyer already has Link CLI installed. You can run
